app-id: com.v3xctrl.viewer
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: v3xctrl

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all

modules:
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=. --prefix=/app -r requirements.txt
    sources:
      - python-deps.json

  - name: v3xctrl-viewer
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-deps --prefix=/app .
      - install -Dm644 build/flatpak/com.v3xctrl.viewer.desktop /app/share/applications/com.v3xctrl.viewer.desktop
      - install -Dm644 build/flatpak/com.v3xctrl.viewer.metainfo.xml /app/share/metainfo/com.v3xctrl.viewer.metainfo.xml
      - install -Dm644 src/v3xctrl_ui/assets/images/logo.png /app/share/icons/hicolor/256x256/apps/com.v3xctrl.viewer.png
    sources:
      - type: dir
        path: ../../
