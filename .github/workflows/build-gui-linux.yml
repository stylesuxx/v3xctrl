name: Build V3XCTRL GUI Executable (Linux)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Git branch to build'
        required: true
        default: 'master'
      version:
        description: 'Version string (leave empty for git hash)'
        required: false
        default: ''

jobs:
  build-linux:
    runs-on: ubuntu-22.04  # Use Ubuntu 22.04 for better glibc compatibility (glibc 2.35)

    env:
      VERSION: ${{ inputs.version || format('{0}', github.sha) }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "VERSION=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
          fi

      - name: Install Python 3.11 from Deadsnakes
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt update
          sudo apt install -y python3.11 python3.11-venv python3.11-dev

      - name: Set up virtualenv + install requirements
        run: |
          python3.11 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r ./build/requirements/viewer.txt
          pip install -r ./build/requirements/develop.txt

      - name: Build AppImage
        run: |
          source venv/bin/activate
          VERSION="${VERSION}" ./build/build-viewer-linux.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: v3xctrl-viewer-linux-${{ env.VERSION }}
          path: build/tmp/v3xctrl-viewer-linux-*.AppImage

  call-cleanup:
    name: Cleanup old workflow runs
    needs: build-linux
    uses: ./.github/workflows/cleanup-old-runs.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      keep_run_id: ${{ github.run_id }}
      workflow_name: ${{ github.workflow }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
