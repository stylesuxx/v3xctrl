name: Build Custom PiOS Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Git branch to build'
        required: true
        default: 'master'
      use_latest_release:
        description: 'Use .deb packages from the latest GitHub release instead of the apt repo'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout selected branch
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.inputs.branch }}

    - name: Load version configuration
      run: |
        source build/versions.env
        echo "PIOS_IMAGE_URL=$PIOS_IMAGE_URL" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          wget jq qemu-user-static f2fs-tools

    - name: Restore cached PiOS image
      id: cache-pios
      uses: actions/cache@v5
      with:
        path: image/raspios-arm64-lite.img.xz
        key: raspios-arm64-lite.img.xz

    - name: Download PiOS image if cache miss
      if: steps.cache-pios.outputs.cache-hit != 'true'
      run: |
        mkdir -p image
        wget -O image/raspios-arm64-lite.img.xz ${{ env.PIOS_IMAGE_URL }}

    - name: Save PiOS image to cache
      if: steps.cache-pios.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: image/raspios-arm64-lite.img.xz
        key: raspios-arm64-lite.img.xz

    - name: Download .deb packages from latest release
      if: ${{ inputs.use_latest_release }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p debs
        gh release download --pattern '*.deb' --dir debs

    - name: Customize PiOS image
      run: |
        if [ "${{ inputs.use_latest_release }}" = "true" ]; then
          sudo ./build/customize-image.sh --local mnt image/raspios-arm64-lite.img.xz debs image/v3xctrl-raspios.img.xz
        else
          sudo ./build/customize-image.sh mnt image/raspios-arm64-lite.img.xz "" image/v3xctrl-raspios.img.xz
        fi

    - name: Upload final image
      uses: actions/upload-artifact@v7
      with:
        name: v3xctrl-raspios
        path: image/v3xctrl-raspios.img.xz

  call-cleanup:
    name: Cleanup old workflow runs
    needs: build
    uses: ./.github/workflows/cleanup-old-runs.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      keep_run_id: ${{ github.run_id }}
      workflow_name: ${{ github.workflow }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
