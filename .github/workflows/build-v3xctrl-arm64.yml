name: Build V3XCTRL deb (arm64)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Git branch to build'
        required: true
        default: 'master'
      version:
        description: 'Package version (e.g. 1.0.0, 1.0.0-RC1). Leave empty for dev build.'
        required: false
        default: ''

jobs:
  build-arm64-deb:
    name: Build V3XCTRL DEB for ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Download v3xctrl-python.deb for Docker image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | jq '.assets[] | select(.name == "v3xctrl-python.deb") | .id')

          if [ -z "$ASSET_ID" ]; then
            echo "Error: v3xctrl-python.deb not found in latest release."
            exit 1
          fi

          curl -L -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID \
            -o v3xctrl-python.deb

      - name: Resolve dev version
        if: ${{ !inputs.version }}
        run: |
          BASE_VERSION=$(grep '^Version:' build/packages/v3xctrl/DEBIAN/control | awk '{print $2}')
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "VERSION=${BASE_VERSION}~dev.${TIMESTAMP}.${SHORT_HASH}" >> $GITHUB_ENV

      - name: Set explicit version
        if: ${{ inputs.version }}
        run: |
          echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build in ARM64 Docker container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfiles/v3xctrl
          platforms: linux/arm64
          push: false
          outputs: type=local,dest=./build/out
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ env.VERSION }}

      - name: Upload built .deb package
        uses: actions/upload-artifact@v7
        with:
          name: v3xctrl-arm64
          path: build/out/src/build/tmp/*.deb

  call-cleanup:
    name: Cleanup old workflow runs
    needs: build-arm64-deb
    uses: ./.github/workflows/cleanup-old-runs.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      keep_run_id: ${{ github.run_id }}
      workflow_name: ${{ github.workflow }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
