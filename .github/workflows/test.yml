name: Run Tests

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'src/**'
      - 'tests/**'
      - 'ruff.toml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'ruff.toml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install ruff==0.15.6
      - run: ruff check src/ tests/ stats-server/
      - run: ruff format --check src/ tests/ stats-server/

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libcairo2-dev pkg-config libgirepository1.0-dev
          python -m pip install --upgrade pip
          pip install -r ./build/requirements/viewer.txt
          pip install -r ./build/requirements/streamer.txt
          pip install -r ./build/requirements/develop.txt
          pip install -r ./build/requirements/udp_relay.txt

      - name: Run tests
        run: python -m pytest tests

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
