name: Build V3XCTRL GUI Executable (macOS)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Git branch to build'
        required: true
        default: 'master'
      version:
        description: 'Version string (leave empty for git hash)'
        required: false
        default: ''

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "VERSION=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
          else
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./build/requirements/viewer.txt pyinstaller

      - name: Generate version file
        run: |
          echo "VERSION = \"${VERSION}\"" > src/v3xctrl_ui/_version.py

      - name: Build executable with PyInstaller
        run: |
          cd src/v3xctrl_ui
          pyinstaller --noconfirm --onefile --windowed -n V3XCTRL main.py

      - name: Rename output
        shell: bash
        run: |
          cd src/v3xctrl_ui/dist
          mv V3XCTRL v3xctrl-viewer-macos-$VERSION

      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: v3xctrl-viewer-macos-${{ env.VERSION }}
          path: src/v3xctrl_ui/dist/v3xctrl-viewer-macos-*

  call-cleanup:
    name: Cleanup old workflow runs
    needs: build-macos
    uses: ./.github/workflows/cleanup-old-runs.yml
    with:
      branch: ${{ github.event.inputs.branch }}
      keep_run_id: ${{ github.run_id }}
      workflow_name: ${{ github.workflow }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
