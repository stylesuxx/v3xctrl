name: Stats Server Tests

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'stats-server/**'
      - 'stats-server/tests/**'
  pull_request:
    paths:
      - 'stats-server/**'
      - 'stats-server/tests/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stats-server/requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest stats-server/tests -v -o "addopts="
