name: Stats Server Tests

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'stats-server/**'
      - 'stats-server/tests/**'
  pull_request:
    paths:
      - 'stats-server/**'
      - 'stats-server/tests/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stats-server/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest stats-server/tests -v -o "addopts=" --cov=stats-server --cov-report=term-missing --cov-report=xml --cov-branch

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          flags: stats-server
          token: ${{ secrets.CODECOV_TOKEN }}
