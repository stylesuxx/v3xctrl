{% extends "base.html" %}
{% block title %}Set Password - Relay Stats{% endblock %}
{% block body %}
<div class="container" style="max-width: 400px; margin-top: 10vh;">
  <h3 class="text-center mb-2">Relay Stats</h3>
  <p class="text-center text-muted mb-4">Set a password for <strong>{{ username }}</strong></p>
  {% if error %}
  <div class="alert alert-danger" role="alert">{{ error }}</div>
  {% endif %}
  <form method="POST" action="{{ url_for('auth.set_password_post') }}">
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" name="password" required autofocus>
    </div>
    <div class="mb-3">
      <label for="confirm" class="form-label">Confirm password</label>
      <input type="password" class="form-control" id="confirm" name="confirm" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Set password</button>
  </form>
</div>
{% endblock %}
